<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Écorce blanche se détachant en bandelettes — Bouleau verruqueux (Betula pendula)</title>
  <desc id="desc">Schéma d'un tronc de bouleau vu de face : écorce d'un blanc éclatant parcourue de fines lignes horizontales sombres (lenticelles) et de légères bandelettes qui se décollent. La base du tronc présente des plaques noires triangulaires caractéristiques, mises en évidence. À droite, pour comparaison, une écorce gris-brun rugueuse étiquetée « autres arbres ».</desc>

  <!-- tronc principal -->
  <rect x="70" y="20" width="160" height="260" rx="8" ry="8" fill="#f2ede4" stroke="#111" stroke-width="1.6"/>

  <!-- lenticelles horizontales sombres (bandelettes) -->
  <g fill="#2a1a0a" stroke="none" fill-opacity="0.55">
    <ellipse cx="150" cy="48"  rx="35" ry="2.5"/>
    <ellipse cx="148" cy="78"  rx="28" ry="2"/>
    <ellipse cx="152" cy="108" rx="40" ry="2.5"/>
    <ellipse cx="149" cy="138" rx="32" ry="2"/>
    <ellipse cx="151" cy="168" rx="38" ry="2.5"/>
    <ellipse cx="147" cy="198" rx="25" ry="2"/>
  </g>

  <!-- lignes de décollement / bandelettes -->
  <g fill="none" stroke="#8b7355" stroke-width="0.85" stroke-dasharray="18 6">
    <path d="M 78 62 Q 150 58 222 63"/>
    <path d="M 78 94 Q 150 90 222 95"/>
    <path d="M 78 124 Q 150 120 222 126"/>
    <path d="M 78 154 Q 150 150 222 155"/>
  </g>

  <!-- plaques noires à la base (caractéristiques) -->
  <g fill="#1a0f06" fill-opacity="0.75" stroke="none">
    <path d="M 90 228 L 108 208 L 126 220 L 116 242 Z"/>
    <path d="M 160 218 L 180 205 L 196 215 L 186 238 Z"/>
    <path d="M 130 240 L 150 230 L 162 248 L 140 258 Z"/>
  </g>

  <!-- zone accent base -->
  <rect x="70" y="205" width="160" height="75" rx="4" fill="#c1502e" fill-opacity="0.13" stroke="none"/>

  <!-- flèche lenticelle -->
  <g fill="#c1502e" stroke="#c1502e">
    <line x1="310" y1="108" x2="234" y2="108" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="234,108 244,103 244,113"/>
  </g>
  <text x="315" y="103" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">lenticelles</text>
  <text x="315" y="119" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">horizontales</text>

  <!-- flèche plaques noires -->
  <g fill="#c1502e" stroke="#c1502e">
    <line x1="310" y1="232" x2="236" y2="232" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="236,232 246,227 246,237"/>
  </g>
  <text x="315" y="227" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">plaques noires</text>
  <text x="315" y="243" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">à la base</text>

  <!-- comparaison : écorce sombre à droite — mini panneau -->
  <rect x="310" y="20" width="72" height="65" rx="4" fill="#b89870" stroke="#111" stroke-width="1.2"/>
  <g stroke="#5a3a1a" stroke-width="0.85" fill="none">
    <path d="M 325 20 L 327 85"/>
    <path d="M 340 20 L 338 85"/>
    <path d="M 355 20 L 357 85"/>
    <path d="M 370 20 L 368 85"/>
    <path d="M 325 38 L 340 40"/>
    <path d="M 340 55 L 355 53"/>
    <path d="M 355 40 L 370 42"/>
    <path d="M 325 68 L 338 66"/>
  </g>
  <text x="346" y="133" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">ailleurs : gris</text>
  <text x="346" y="146" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">et rugueux</text>

  <!-- caption -->
  <text x="150" y="292" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#888" font-style="italic">blanc pur même sur vieux sujets</text>
</svg>
