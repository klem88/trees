<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Chatons cylindriques femelles se désagrégeant en samares — Bouleau verruqueux (Betula pendula)</title>
  <desc id="desc">Schéma d'un rameau de bouleau en automne portant deux chatons femelles cylindriques dressés. Le chaton de droite est intact et compact, mis en évidence par une flèche. Celui de gauche se désagrège en montrant des petites bractées trilobées et des samares ailées qui s'en échappent. En bas à droite, une samare isolée agrandie.</desc>

  <!-- rameau principal -->
  <path d="M 40 90 L 280 90" stroke="#6b4420" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- feuilles sur le rameau -->
  <g fill="#fdfdfd" stroke="#111" stroke-width="1.1" stroke-linejoin="round">
    <path d="M 70 90 C 65 78 52 68 50 58 C 56 55 68 64 74 74 L 76 90 Z"/>
    <path d="M 120 90 C 116 78 103 66 102 56 C 108 53 120 62 126 74 L 128 90 Z"/>
    <path d="M 200 90 C 196 78 184 67 182 57 C 188 54 200 63 206 74 L 208 90 Z"/>
  </g>

  <!-- chaton gauche (se désagrégeant) -->
  <g transform="translate(100 28)">
    <!-- corps du chaton cylindrique -->
    <rect x="0" y="0" width="22" height="58" rx="8" fill="#a08050" stroke="#111" stroke-width="1.3"/>
    <!-- stries des bractées -->
    <g stroke="#5a3a10" stroke-width="0.7" fill="none">
      <path d="M 2 10 L 20 10"/>
      <path d="M 2 18 L 20 18"/>
      <path d="M 2 26 L 20 26"/>
      <path d="M 2 34 L 20 34"/>
      <path d="M 2 42 L 20 42"/>
      <path d="M 2 50 L 20 50"/>
    </g>
    <!-- samares qui s'échappent -->
    <g fill="#c8a860" stroke="#111" stroke-width="0.7">
      <ellipse cx="-8" cy="14" rx="9" ry="3.5" transform="rotate(-20 -8 14)"/>
      <ellipse cx="-10" cy="28" rx="9" ry="3.5" transform="rotate(-30 -10 28)"/>
      <ellipse cx="-6" cy="42" rx="9" ry="3.5" transform="rotate(-15 -6 42)"/>
    </g>
    <g fill="#c8a860" stroke="#111" stroke-width="0.7">
      <ellipse cx="30" cy="10" rx="9" ry="3.5" transform="rotate(25 30 10)"/>
      <ellipse cx="32" cy="24" rx="9" ry="3.5" transform="rotate(35 32 24)"/>
    </g>
  </g>

  <!-- chaton droit (intact) mis en évidence -->
  <rect x="192" y="22" width="22" height="62" rx="10" fill="#c1502e" fill-opacity="0.15" stroke="none"/>
  <g transform="translate(192 22)">
    <rect x="0" y="0" width="22" height="62" rx="10" fill="#a08050" stroke="#111" stroke-width="1.4"/>
    <g stroke="#5a3a10" stroke-width="0.7" fill="none">
      <path d="M 2 10 L 20 10"/>
      <path d="M 2 18 L 20 18"/>
      <path d="M 2 26 L 20 26"/>
      <path d="M 2 34 L 20 34"/>
      <path d="M 2 42 L 20 42"/>
      <path d="M 2 50 L 20 50"/>
      <path d="M 2 58 L 20 58"/>
    </g>
  </g>
  <!-- pédoncule du chaton droit -->
  <path d="M 203 84 L 203 90" stroke="#6b4420" stroke-width="2" fill="none"/>

  <!-- flèche chaton intact -->
  <g fill="#c1502e" stroke="#c1502e">
    <line x1="285" y1="50" x2="218" y2="50" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="218,50 228,45 228,55"/>
  </g>
  <text x="290" y="46" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">chaton</text>
  <text x="290" y="62" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">cylindrique</text>

  <!-- samare agrandie en bas à droite -->
  <g transform="translate(280 160)">
    <rect x="-5" y="-5" width="100" height="80" rx="4" fill="#faf6f0" stroke="#888" stroke-width="0.9" stroke-dasharray="3 3"/>
    <!-- corps de la samare -->
    <ellipse cx="45" cy="52" rx="10" ry="6" fill="#c8a860" stroke="#111" stroke-width="1.1"/>
    <!-- aile -->
    <path d="M 36 52 C 20 42 15 28 25 18 C 35 8 55 12 60 22 C 65 32 58 46 46 48"
          fill="#e8d090" stroke="#111" stroke-width="1" fill-opacity="0.7"/>
    <text x="48" y="72" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">samare ailée</text>
  </g>

  <!-- label se désagrégeant -->
  <text x="102" y="110" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#888" font-style="italic">se désagrégeant</text>
  <text x="102" y="122" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#888" font-style="italic">en automne</text>
</svg>
