<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Feuille triangulaire à double denture — Bouleau verruqueux (Betula pendula)</title>
  <desc id="desc">Feuille de bouleau verruqueux vue de face : forme triangulaire à losange, apex effilé, base quasi droite. Le bord porte une double denture — grandes dents portant elles-mêmes de petites dents — mise en évidence à droite par un encadré agrandi. Long pétiole fin. À gauche, pour comparaison, une petite feuille à dents simples.</desc>

  <!-- zone accent double denture -->
  <path d="M 192 130 L 188 145 L 196 138 L 200 155 L 206 140 L 212 152 L 214 130 Z"
        fill="#c1502e" fill-opacity="0.18" stroke="none"/>

  <g fill="none" stroke="#111" stroke-linejoin="round" stroke-linecap="round">
    <!-- feuille triangulaire principale -->
    <path d="M 150 30
             C 152 32 180 60 196 88
             C 204 104 212 120 214 130
             C 216 140 212 152 206 152
             L 200 155
             C 196 156 192 153 188 148
             L 184 142
             C 180 137 176 135 172 137
             L 168 140
             C 164 143 160 144 156 142
             L 150 138
             C 146 135 142 130 140 124
             C 134 108 126 88 124 70
             C 118 48 138 28 150 30 Z"
          stroke-width="1.6" fill="#fdfdfd"/>

    <!-- pétiole long -->
    <path d="M 168 140 L 172 200 L 170 240" stroke-width="1.2"/>

    <!-- nervure centrale -->
    <path d="M 150 32 Q 162 90 168 138" stroke-width="1.1"/>

    <!-- nervures secondaires gauche -->
    <path d="M 158 58 Q 140 65 126 80" stroke-width="0.85"/>
    <path d="M 161 80 Q 140 88 127 105" stroke-width="0.85"/>
    <path d="M 163 103 Q 144 112 133 128" stroke-width="0.85"/>

    <!-- nervures secondaires droite -->
    <path d="M 158 58 Q 172 62 186 75" stroke-width="0.85"/>
    <path d="M 161 80 Q 176 84 194 96" stroke-width="0.85"/>
    <path d="M 163 103 Q 180 108 204 118" stroke-width="0.85"/>
    <path d="M 165 124 Q 182 128 210 132" stroke-width="0.85"/>
  </g>

  <!-- encadré zoom double denture -->
  <rect x="228" y="110" width="130" height="120" rx="4" fill="#faf6f0" stroke="#888" stroke-width="0.9" stroke-dasharray="3 3"/>
  <g fill="none" stroke="#111" stroke-linejoin="round" stroke-linecap="round">
    <!-- segment de bord agrandi, double denture -->
    <path d="M 240 195
             L 248 170 L 256 180 L 262 160
             L 270 172 L 278 155
             L 286 168 L 292 150
             L 300 163 L 308 148
             L 314 160 L 320 145
             L 326 158 L 332 140
             L 340 152 L 346 138
             L 352 152"
          stroke-width="1.4" fill="none"/>
  </g>
  <text x="293" y="214" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">grande dent</text>
  <text x="293" y="226" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">portant petites dents</text>

  <!-- flèche vers zone accent -->
  <g fill="#c1502e" stroke="#c1502e">
    <line x1="226" y1="145" x2="215" y2="143" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="215,143 225,138 225,148"/>
  </g>
  <text x="232" y="102" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">double</text>
  <text x="232" y="116" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">denture</text>

  <!-- comparaison : feuille à dents simples (gauche, petite) -->
  <g fill="none" stroke="#111" stroke-linejoin="round" stroke-linecap="round" transform="translate(18 60)">
    <path d="M 45 10
             C 58 8 72 35 70 70
             C 69 90 60 100 50 98
             C 40 96 30 88 28 68
             C 24 35 32 12 45 10 Z"
          stroke-width="1.2" fill="#fdfdfd"/>
    <path d="M 45 12 L 46 96" stroke-width="0.85"/>
    <path d="M 43 35 Q 28 42 22 58" stroke-width="0.65"/>
    <path d="M 44 55 Q 30 63 24 78" stroke-width="0.65"/>
    <path d="M 44 35 Q 58 38 68 52" stroke-width="0.65"/>
    <path d="M 44 56 Q 58 60 68 74" stroke-width="0.65"/>
    <path d="M 46 95 L 44 130" stroke-width="0.9"/>
  </g>
  <text x="62" y="215" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">ailleurs :</text>
  <text x="62" y="228" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">dents simples</text>

  <text x="170" y="290" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#888" font-style="italic">feuille triangulaire, long pétiole flexible</text>
</svg>
