<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Silhouette élancée et légère aux rameaux retombants — Bouleau verruqueux (Betula pendula)</title>
  <desc id="desc">Silhouette complète d'un bouleau verruqueux adulte : tronc fin et droit à écorce blanche, branches principales ascendantes portant de longs rameaux fins qui retombent comme des mèches. Le port est aérien et transparent, presque comme un rideau de fils. À droite, pour comparaison, une silhouette compacte et dense d'arbre feuillu ordinaire.</desc>

  <!-- tronc blanc -->
  <rect x="190" y="140" width="18" height="148" rx="4" fill="#f0ede4" stroke="#111" stroke-width="1.4"/>
  <!-- lenticelles tronc -->
  <g fill="#2a1a0a" stroke="none" fill-opacity="0.5">
    <ellipse cx="199" cy="158" rx="5" ry="1.5"/>
    <ellipse cx="199" cy="178" rx="5" ry="1.5"/>
    <ellipse cx="199" cy="198" rx="5" ry="1.5"/>
    <ellipse cx="199" cy="218" rx="5" ry="1.5"/>
  </g>

  <!-- branche principale gauche 1 -->
  <path d="M 196 145 C 180 130 155 110 130 90" stroke="#6b4420" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- rameaux penduleux gauche 1 -->
  <g stroke="#6b4420" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M 162 120 C 150 135 140 158 134 180"/>
    <path d="M 148 108 C 136 122 126 145 120 168"/>
    <path d="M 136 96 C 122 110 112 132 108 158"/>
    <path d="M 130 92 C 116 108 104 134 98 162"/>
  </g>

  <!-- branche principale droite 1 -->
  <path d="M 202 145 C 220 128 248 108 272 88" stroke="#6b4420" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- rameaux penduleux droite 1 -->
  <g stroke="#6b4420" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M 240 110 C 254 124 262 148 268 172"/>
    <path d="M 255 100 C 268 114 276 138 280 162"/>
    <path d="M 268 90 C 280 105 286 130 288 156"/>
  </g>

  <!-- branche principale gauche 2 (plus haute) -->
  <path d="M 194 152 C 172 138 148 118 120 98" stroke="#6b4420" stroke-width="3" fill="none" stroke-linecap="round"/>
  <g stroke="#6b4420" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M 140 110 C 128 126 118 150 112 176"/>
    <path d="M 126 102 C 112 118 102 142 96 170"/>
  </g>

  <!-- branche droite 2 (plus haute) -->
  <path d="M 204 152 C 228 136 255 112 282 94" stroke="#6b4420" stroke-width="3" fill="none" stroke-linecap="round"/>
  <g stroke="#6b4420" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M 258 106 C 270 122 276 146 278 170"/>
    <path d="M 272 96 C 284 112 290 138 292 164"/>
  </g>

  <!-- branche centrale (sommet) -->
  <path d="M 199 140 C 199 120 200 100 202 75" stroke="#6b4420" stroke-width="3" fill="none" stroke-linecap="round"/>
  <g stroke="#6b4420" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M 200 82 C 185 95 172 118 166 145"/>
    <path d="M 202 82 C 216 96 228 118 232 145"/>
  </g>

  <!-- sol -->
  <line x1="60" y1="288" x2="340" y2="288" stroke="#888" stroke-width="0.9"/>

  <!-- accent flèche rameaux penduleux -->
  <g fill="#c1502e" stroke="#c1502e">
    <line x1="68" y1="170" x2="118" y2="158" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="118,158 107,157 112,167"/>
  </g>
  <text x="20" y="155" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">rameaux</text>
  <text x="20" y="171" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">retombants</text>

  <!-- comparaison silhouette dense (droite) -->
  <g transform="translate(310 160)">
    <rect x="30" y="68" width="10" height="60" rx="2" fill="#8a7055" stroke="#111" stroke-width="1"/>
    <ellipse cx="35" cy="50" rx="28" ry="38" fill="none" stroke="#555" stroke-width="1.2"/>
    <ellipse cx="35" cy="50" rx="20" ry="30" fill="none" stroke="#888" stroke-width="0.7" stroke-dasharray="2 3"/>
  </g>
  <text x="345" y="248" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">autres feuillus :</text>
  <text x="345" y="261" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">houppier dense</text>
</svg>
