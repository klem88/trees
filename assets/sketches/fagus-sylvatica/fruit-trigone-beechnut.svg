<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" role="img" aria-labelledby="title desc">
  <title id="title">Faîne trigone dans cupule à soies molles — Hêtre commun (Fagus sylvatica)</title>
  <desc id="desc">À gauche, une faîne de hêtre vue de face : fruit brun brillant à trois faces avec une arête vive centrale. À droite, la coupe transversale triangulaire et la cupule à soies molles.</desc>

  <!-- ══ Faîne (vue de face, grande) ══ -->
  <!-- Corps trigone : deux faces visibles séparées par l'arête centrale -->
  <path d="M 112 42
           C  98  50  82  72  82 108
           C  82 148  96 172 112 178
           C 128 172 142 148 142 108
           C 142  72 126  50 112  42 Z"
        fill="#8a5228" stroke="#111" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- Arête centrale (arête vive entre les deux faces visibles) -->
  <line x1="112" y1="42" x2="112" y2="178" stroke="#c8923a" stroke-width="1.4"/>
  <!-- Limite de la face gauche (en pointillé = face cachée) -->
  <path d="M 112 42 C 98 50 82 72 82 108 C 82 148 96 172 112 178"
        fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="3 2"/>

  <!-- Pétiole -->
  <line x1="112" y1="42" x2="112" y2="22" stroke="#6b4420" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Zone accent -->
  <path d="M 112 42 C 126 50 142 72 142 108 C 142 148 128 172 112 178
           C 122 172 132 148 132 108 C 132 72 120 50 112 42 Z"
        fill="#c1502e" fill-opacity="0.15" stroke="none"/>

  <!-- ══ Flèche + label ══ -->
  <g fill="#c1502e" stroke="#c1502e">
    <line x1="370" y1="110" x2="144" y2="110" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="144,110 154,105 154,115"/>
  </g>
  <text x="373" y="100" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">faîne</text>
  <text x="373" y="116" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">3 faces</text>
  <text x="373" y="135" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">brun brillant</text>

  <!-- ══ Séparateur ══ -->
  <line x1="188" y1="30" x2="188" y2="270" stroke="#888" stroke-width="0.7" stroke-dasharray="3 3"/>

  <!-- ══ Coupe transversale (triangle équilatéral) ══ -->
  <polygon points="280,48 248,108 312,108"
           fill="#8a5228" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="280" y1="48" x2="280" y2="108" stroke="#c8923a" stroke-width="1.1"/>
  <text x="280" y="130" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">coupe : 3 faces</text>

  <!-- ══ Cupule (schéma simplifié) ══ -->
  <ellipse cx="280" cy="200" rx="44" ry="34" fill="#c8a860" stroke="#111" stroke-width="1.4"/>
  <!-- Soies molles (courtes, régulières) -->
  <g stroke="#111" stroke-width="0.9" stroke-linecap="round">
    <line x1="237" y1="192" x2="226" y2="188"/>
    <line x1="236" y1="204" x2="225" y2="203"/>
    <line x1="240" y1="216" x2="230" y2="220"/>
    <line x1="323" y1="192" x2="334" y2="188"/>
    <line x1="324" y1="204" x2="335" y2="203"/>
    <line x1="320" y1="216" x2="330" y2="220"/>
    <line x1="260" y1="167" x2="258" y2="156"/>
    <line x1="280" y1="166" x2="280" y2="155"/>
    <line x1="300" y1="167" x2="302" y2="156"/>
    <line x1="258" y1="232" x2="254" y2="243"/>
    <line x1="280" y1="234" x2="280" y2="245"/>
    <line x1="302" y1="232" x2="306" y2="243"/>
  </g>
  <!-- 2 faînes à l'intérieur -->
  <polygon points="268,196 260,214 278,214" fill="#5a3010" stroke="#111" stroke-width="1.1"/>
  <polygon points="292,194 284,212 302,212" fill="#5a3010" stroke="#111" stroke-width="1.1"/>
  <text x="280" y="265" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">cupule à soies molles</text>
</svg>
