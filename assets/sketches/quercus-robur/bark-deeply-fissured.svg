<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Écorce profondément crevassée — Chêne pédonculé (Quercus robur)</title>
  <desc id="desc">Détail de l'écorce d'un vieux chêne pédonculé : surface gris-brun parcourue de profondes crevasses verticales et obliques irrégulières, formant des crêtes saillantes. Une zone est mise en évidence. À droite, pour comparaison, une écorce lisse de hêtre jeune adulte.</desc>

  <!-- fond de l'écorce -->
  <rect x="40" y="30" width="210" height="240" rx="5" fill="#c4a878" stroke="#111" stroke-width="1.6"/>

  <!-- crêtes et sillons profonds -->
  <g fill="#5a3a18" stroke="none">
    <!-- sillons verticaux principaux (polygones sombres) -->
    <polygon points="60,30 68,30 64,270 56,270"/>
    <polygon points="95,30 104,40 100,270 92,268"/>
    <polygon points="130,30 138,35 136,270 128,270"/>
    <polygon points="168,30 174,32 172,270 164,270"/>
    <polygon points="205,30 212,32 210,270 202,270"/>
    <!-- sillons obliques transversaux -->
    <polygon points="40,80 250,86 250,90 40,84"/>
    <polygon points="40,145 250,140 250,145 40,150"/>
    <polygon points="40,205 250,200 250,205 40,210"/>
  </g>

  <!-- crêtes saillantes (légèrement plus claires) -->
  <g fill="#d4b888" stroke="none">
    <polygon points="68,30 95,30 92,268 64,270"/>
    <polygon points="104,40 130,30 128,270 100,270"/>
    <polygon points="138,35 168,30 164,270 136,270"/>
    <polygon points="174,32 205,30 202,270 172,270"/>
  </g>

  <!-- texture fine sur les crêtes -->
  <g stroke="#8a6030" stroke-width="0.55" fill="none" opacity="0.6">
    <path d="M 72 50 L 88 55"/>
    <path d="M 70 70 L 90 68"/>
    <path d="M 72 100 L 88 103"/>
    <path d="M 70 120 L 91 118"/>
    <path d="M 72 160 L 88 162"/>
    <path d="M 70 185 L 90 183"/>
    <path d="M 72 225 L 88 228"/>
    <path d="M 70 248 L 90 246"/>
    <path d="M 108 55 L 126 52"/>
    <path d="M 106 100 L 128 98"/>
    <path d="M 108 160 L 126 162"/>
    <path d="M 106 220 L 128 218"/>
    <path d="M 142 48 L 162 52"/>
    <path d="M 140 110 L 164 108"/>
    <path d="M 142 175 L 162 178"/>
    <path d="M 140 240 L 164 238"/>
    <path d="M 178 46 L 200 50"/>
    <path d="M 176 105 L 200 103"/>
    <path d="M 178 170 L 200 174"/>
    <path d="M 176 235 L 200 233"/>
  </g>

  <!-- zone accent crevasse profonde -->
  <polygon points="128,135 138,130 136,155 128,160" fill="#c1502e" fill-opacity="0.22" stroke="none"/>

  <!-- comparaison écorce lisse hêtre -->
  <rect x="295" y="30" width="88" height="90" rx="4" fill="#d0cdc8" stroke="#111" stroke-width="1.3"/>
  <g stroke="#aaa" stroke-width="0.6" fill="none">
    <ellipse cx="339" cy="60" rx="22" ry="6" stroke-dasharray="3 3"/>
    <ellipse cx="339" cy="80" rx="18" ry="5" stroke-dasharray="3 3"/>
  </g>
  <text x="339" y="132" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">hêtre : lisse</text>

  <!-- flèche crevasse profonde -->
  <g fill="#c1502e" stroke="#c1502e">
    <line x1="295" y1="168" x2="140" y2="168" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="140,168 150,163 150,173"/>
  </g>
  <text x="300" y="158" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">crevasses</text>
  <text x="300" y="174" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">profondes</text>
  <text x="300" y="190" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">dès l'âge adulte</text>

  <text x="145" y="291" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#888" font-style="italic">gris-brun, crêtes et sillons marqués sur vieux sujets</text>
</svg>
