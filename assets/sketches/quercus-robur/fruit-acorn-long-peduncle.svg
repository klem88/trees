<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Glands portés par un long pédoncule — Chêne pédonculé (Quercus robur)</title>
  <desc id="desc">Schéma d'un rameau de chêne pédonculé en automne portant deux glands attachés à un long pédoncule fin de 3 à 7 cm, mis en évidence par une flèche rouge et une mesure. Chaque gland est ovoïde, brun, dans une cupule à écailles plates. À droite, pour comparaison, des glands de chêne sessile fixés directement sur le rameau sans pédoncule visible.</desc>

  <!-- rameau principal -->
  <path d="M 30 120 L 240 120" stroke="#6b4420" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- feuilles lobées sur le rameau -->
  <g fill="#fdfdfd" stroke="#111" stroke-width="1" stroke-linejoin="round">
    <!-- feuille gauche -->
    <path d="M 60 120
             C 56 112 48 108 44 100 C 48 96 56 100 60 107
             C 62 100 56 90 58 83 C 63 82 68 90 66 100
             C 70 94 66 84 70 78 C 76 78 78 88 75 97
             C 78 90 76 80 82 76 C 87 78 86 88 82 97
             C 85 92 86 82 91 80 C 95 83 93 93 89 100
             C 94 96 96 88 101 87 C 104 91 101 100 97 106
             C 101 104 105 96 109 97 C 111 102 108 110 104 114
             L 100 120 Z"
          stroke-width="1.1"/>
    <!-- pétiole de la feuille (très court) -->
    <path d="M 80 120 L 80 124" stroke-width="1"/>
  </g>

  <!-- long pédoncule avec 2 glands -->
  <path d="M 150 120 C 150 148 148 170 146 192" stroke="#6b4420" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- gland 1 (haut du pédoncule) -->
  <g transform="translate(120 195)">
    <!-- cupule -->
    <path d="M 0 0 C -14 2 -16 16 -14 22 L 14 22 C 16 16 14 2 0 0 Z"
          fill="#c8a860" stroke="#111" stroke-width="1.2"/>
    <!-- écailles de la cupule -->
    <g stroke="#7a6030" stroke-width="0.7" fill="none">
      <path d="M -12 6 Q 0 4 12 6"/>
      <path d="M -13 12 Q 0 10 13 12"/>
      <path d="M -14 18 Q 0 16 14 18"/>
    </g>
    <!-- corps du gland -->
    <path d="M -10 22 C -12 38 -8 52 0 56 C 8 52 12 38 10 22 Z"
          fill="#8a6830" stroke="#111" stroke-width="1.3"/>
    <!-- pointe du gland -->
    <path d="M 0 56 L 0 62" stroke="#6b4420" stroke-width="1.2"/>
  </g>

  <!-- gland 2 (embranchement du pédoncule) -->
  <path d="M 148 165 C 168 168 182 175 188 185" stroke="#6b4420" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <g transform="translate(182 185)">
    <path d="M 0 0 C -13 2 -15 14 -13 20 L 13 20 C 15 14 13 2 0 0 Z"
          fill="#c8a860" stroke="#111" stroke-width="1.2"/>
    <g stroke="#7a6030" stroke-width="0.7" fill="none">
      <path d="M -11 6 Q 0 4 11 6"/>
      <path d="M -12 12 Q 0 10 12 12"/>
      <path d="M -13 17 Q 0 15 13 17"/>
    </g>
    <path d="M -9 20 C -11 34 -7 46 0 50 C 7 46 11 34 9 20 Z"
          fill="#8a6830" stroke="#111" stroke-width="1.3"/>
    <path d="M 0 50 L 0 56" stroke="#6b4420" stroke-width="1.2"/>
  </g>

  <!-- mesure du pédoncule -->
  <line x1="155" y1="120" x2="155" y2="194" stroke="#888" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="150" y1="122" x2="160" y2="122" stroke="#888" stroke-width="0.8"/>
  <line x1="150" y1="192" x2="160" y2="192" stroke="#888" stroke-width="0.8"/>

  <!-- flèche + label pédoncule -->
  <g fill="#c1502e" stroke="#c1502e">
    <line x1="220" y1="155" x2="160" y2="155" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="160,155 170,150 170,160"/>
  </g>
  <text x="225" y="150" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">long pédoncule</text>
  <text x="225" y="166" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">3 à 7 cm</text>

  <!-- zone accent pédoncule -->
  <rect x="140" y="118" width="16" height="78" rx="3" fill="#c1502e" fill-opacity="0.14" stroke="none"/>

  <!-- comparaison : chêne sessile (droite) -->
  <g transform="translate(300 80)">
    <path d="M 0 40 L 80 40" stroke="#6b4420" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- gland sessile 1 directement sur le rameau -->
    <g transform="translate(22 40)">
      <path d="M 0 0 C -10 1 -12 10 -10 16 L 10 16 C 12 10 10 1 0 0 Z" fill="#c8a860" stroke="#111" stroke-width="1"/>
      <path d="M -8 16 C -9 28 -6 38 0 41 C 6 38 9 28 8 16 Z" fill="#8a6830" stroke="#111" stroke-width="1.1"/>
    </g>
    <!-- gland sessile 2 -->
    <g transform="translate(52 40)">
      <path d="M 0 0 C -10 1 -12 10 -10 16 L 10 16 C 12 10 10 1 0 0 Z" fill="#c8a860" stroke="#111" stroke-width="1"/>
      <path d="M -8 16 C -9 28 -6 38 0 41 C 6 38 9 28 8 16 Z" fill="#8a6830" stroke="#111" stroke-width="1.1"/>
    </g>
  </g>
  <text x="340" y="172" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">Q. petraea :</text>
  <text x="340" y="185" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">glands sessiles</text>
  <text x="340" y="198" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">(sans pédoncule)</text>

  <text x="150" y="290" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#888" font-style="italic">le pédoncule donne son nom à l'espèce</text>
</svg>
