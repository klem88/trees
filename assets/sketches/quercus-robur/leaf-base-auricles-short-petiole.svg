<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Oreillettes à la base et pétiole très court — Chêne pédonculé (Quercus robur)</title>
  <desc id="desc">Gros plan sur la base d'une feuille de chêne pédonculé : deux petits lobes arrondis symétriques (les oreillettes ou auricules) encadrent un pétiole très court de 2 à 7 mm, mis en évidence par des flèches rouges. À droite, pour comparaison, une base de feuille de chêne sessile sans oreillettes et à pétiole plus long.</desc>

  <!-- zone accent oreillettes -->
  <path d="M 155 178 C 130 175 115 195 118 215 C 121 232 140 240 160 238 C 180 240 200 232 202 215 C 205 195 188 175 162 178 Z"
        fill="#c1502e" fill-opacity="0.16" stroke="none"/>

  <g fill="none" stroke="#111" stroke-linejoin="round" stroke-linecap="round">
    <!-- partie basse de la feuille (lobes du bas) -->
    <path d="M 160 40
             C 162 50 165 68 164 85
             C 178 84 194 92 196 106
             C 198 120 188 130 175 130
             C 178 142 178 156 175 168
             C 185 168 196 176 197 190
             C 198 204 190 214 178 215
             L 202 215
             C 205 195 190 175 162 178
             C 155 175 150 175 145 178
             L 118 215
             C 121 195 108 175 122 215
             C 110 214 102 204 103 190
             C 104 176 115 168 125 168
             C 122 156 122 142 125 130
             C 112 130 102 120 104 106
             C 106 92 122 84 136 85
             C 135 68 138 50 140 40 Z"
          stroke-width="1.5" fill="#fdfdfd"/>

    <!-- oreillette gauche -->
    <path d="M 118 215 C 106 214 96 224 98 236 C 100 246 112 250 122 246 C 132 242 136 230 132 220 L 118 215 Z"
          stroke-width="1.5" fill="#fdfdfd"/>

    <!-- oreillette droite -->
    <path d="M 202 215 C 214 214 224 224 222 236 C 220 246 208 250 198 246 C 188 242 184 230 188 220 L 202 215 Z"
          stroke-width="1.5" fill="#fdfdfd"/>

    <!-- pétiole très court -->
    <path d="M 155 178 L 153 256 L 157 270" stroke-width="1.2"/>
    <path d="M 162 178 L 163 256 L 159 270" stroke-width="1.2"/>
    <path d="M 153 270 L 163 270" stroke-width="1.2"/>

    <!-- nervure centrale -->
    <path d="M 160 42 Q 160 110 160 175" stroke-width="1.1"/>
  </g>

  <!-- mesure pétiole -->
  <line x1="168" y1="180" x2="168" y2="268" stroke="#888" stroke-width="0.75" stroke-dasharray="3 3"/>
  <line x1="164" y1="182" x2="172" y2="182" stroke="#888" stroke-width="0.75"/>
  <line x1="164" y1="268" x2="172" y2="268" stroke="#888" stroke-width="0.75"/>

  <!-- flèche oreillette gauche -->
  <g fill="#c1502e" stroke="#c1502e">
    <line x1="68" y1="235" x2="108" y2="235" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="108,235 98,230 98,240"/>
  </g>
  <text x="12" y="225" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">oreillettes</text>
  <text x="20" y="241" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">(auricules)</text>

  <!-- flèche pétiole court -->
  <g fill="#c1502e" stroke="#c1502e">
    <line x1="240" y1="225" x2="172" y2="225" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="172,225 182,220 182,230"/>
  </g>
  <text x="245" y="215" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">pétiole</text>
  <text x="245" y="231" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">2–7 mm</text>

  <!-- comparaison Q. petraea : base sans oreillettes, pétiole plus long -->
  <g transform="translate(300 120)">
    <rect x="-8" y="-8" width="96" height="155" rx="4" fill="#faf6f0" stroke="#888" stroke-width="0.9" stroke-dasharray="3 3"/>
    <g fill="none" stroke="#111" stroke-linejoin="round" stroke-linecap="round">
      <!-- base arrondie sans oreillettes -->
      <path d="M 40 5
               C 60 5 72 18 72 35
               C 72 52 60 62 40 62
               C 20 62 8 52 8 35
               C 8 18 20 5 40 5 Z"
            stroke-width="1.2" fill="#fdfdfd"/>
      <!-- pétiole long -->
      <path d="M 36 62 L 34 110" stroke-width="1.2"/>
      <path d="M 44 62 L 46 110" stroke-width="1.2"/>
      <!-- nervure centrale -->
      <path d="M 40 7 L 40 62" stroke-width="0.85"/>
    </g>
    <text x="40" y="126" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">Q. petraea :</text>
    <text x="40" y="138" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">sans oreillettes</text>
  </g>

  <text x="160" y="293" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#888" font-style="italic">les oreillettes encadrent la tige comme deux petites oreilles</text>
</svg>
