<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Feuille à lobes arrondis sans pointes — Chêne pédonculé (Quercus robur)</title>
  <desc id="desc">Feuille de chêne pédonculé vue de face : silhouette oblongue découpée en 4 à 5 paires de lobes latéraux arrondis, sans aucune pointe acérée au sommet. Un lobe est mis en évidence par un encadré et une flèche rouge avec la mention « arrondi, sans pointe ». À droite, pour comparaison, un lobe de chêne rouge d'Amérique avec une pointe acérée bien visible.</desc>

  <!-- zone accent lobe arrondi -->
  <path d="M 148 110 C 148 95 160 85 175 88 C 190 91 198 103 196 118 C 194 130 182 138 168 135 C 155 132 148 124 148 110 Z"
        fill="#c1502e" fill-opacity="0.17" stroke="none"/>

  <g fill="none" stroke="#111" stroke-linejoin="round" stroke-linecap="round">
    <!-- feuille de chêne pédonculé : lobes arrondis -->
    <path d="M 140 260
             C 136 252 132 240 134 228
             C 120 226 110 216 112 204
             C 114 192 126 186 136 190
             C 132 178 128 168 132 158
             C 112 156 100 144 104 132
             C 108 120 122 116 134 120
             C 130 110 128 98 132 88
             C 116 84 108 70 114 58
             C 120 46 136 44 146 52
             C 148 40 152 30 160 28
             C 168 26 172 36 170 48
             C 178 40 188 38 196 44
             C 204 50 204 64 196 72
             C 208 72 218 80 218 92
             C 218 104 208 112 196 110
             C 200 120 202 132 198 142
             C 210 142 220 150 220 162
             C 220 174 210 182 198 180
             C 200 190 200 202 196 212
             C 208 212 218 220 218 232
             C 218 244 208 252 196 250
             C 194 258 190 266 184 268
             C 176 270 168 264 164 256
             C 158 262 150 268 142 268
             C 136 268 132 262 140 260 Z"
          stroke-width="1.6" fill="#fdfdfd"/>

    <!-- pétiole très court -->
    <path d="M 162 264 L 162 280" stroke-width="1.2"/>

    <!-- nervure centrale -->
    <path d="M 160 30 Q 162 148 162 264" stroke-width="1.1"/>

    <!-- nervures secondaires vers les lobes -->
    <path d="M 158 56 Q 144 58 130 64" stroke-width="0.85"/>
    <path d="M 158 56 Q 174 56 194 60" stroke-width="0.85"/>
    <path d="M 160 90 Q 144 92 118 100" stroke-width="0.85"/>
    <path d="M 160 90 Q 178 90 210 98" stroke-width="0.85"/>
    <path d="M 161 128 Q 144 128 112 138" stroke-width="0.85"/>
    <path d="M 161 128 Q 180 128 214 138" stroke-width="0.85"/>
    <path d="M 161 164 Q 144 164 110 174" stroke-width="0.85"/>
    <path d="M 161 164 Q 182 164 216 174" stroke-width="0.85"/>
    <path d="M 162 200 Q 146 200 116 210" stroke-width="0.85"/>
    <path d="M 162 200 Q 180 200 212 210" stroke-width="0.85"/>
    <path d="M 162 234 Q 148 234 124 244" stroke-width="0.85"/>
    <path d="M 162 234 Q 178 234 206 244" stroke-width="0.85"/>
  </g>

  <!-- flèche lobe arrondi -->
  <g fill="#c1502e" stroke="#c1502e">
    <line x1="80" y1="100" x2="148" y2="108" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="148,108 138,104 140,114"/>
  </g>
  <text x="16" y="90" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">arrondi,</text>
  <text x="16" y="106" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">sans pointe</text>

  <!-- comparaison : lobe pointu chêne rouge (droite) -->
  <g transform="translate(270 60)">
    <rect x="-10" y="-5" width="110" height="110" rx="4" fill="#faf6f0" stroke="#888" stroke-width="0.9" stroke-dasharray="3 3"/>
    <g fill="none" stroke="#111" stroke-linejoin="round" stroke-linecap="round">
      <!-- lobe pointu type chêne rouge -->
      <path d="M 45 5
               C 55 5 80 20 82 40
               C 84 55 75 65 68 70
               L 60 78
               C 55 85 48 88 45 100
               C 42 88 35 85 30 78
               L 22 70
               C 15 65 6 55 8 40
               C 10 20 35 5 45 5 Z"
            stroke-width="1.3"/>
      <!-- pointes acérées -->
      <path d="M 45 5 L 42 0" stroke-width="1"/>
      <path d="M 82 40 L 87 38" stroke-width="1"/>
      <path d="M 8 40 L 3 38" stroke-width="1"/>
      <path d="M 68 70 L 72 74" stroke-width="1"/>
      <path d="M 22 70 L 18 74" stroke-width="1"/>
    </g>
    <text x="45" y="118" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">chêne rouge :</text>
    <text x="45" y="130" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">lobes pointus</text>
  </g>

  <text x="162" y="295" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#888" font-style="italic">pétiole très court (2–7 mm)</text>
</svg>
