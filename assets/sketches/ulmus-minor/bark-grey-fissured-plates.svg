<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Écorce en plaques rectangulaires — Orme champêtre (Ulmus minor)</title>
  <desc id="desc">Détail de l'écorce d'un orme champêtre adulte : surface gris-brun parsemée de fissures verticales et horizontales dessinant de petites plaques rectangulaires fines, comme un fin pavage vertical. À droite, un échantillon d'écorce lisse pour comparaison (type hêtre, jeune orme).</desc>

  <rect x="50" y="50" width="200" height="200" rx="4" ry="4" fill="#e8dfd1" stroke="#111" stroke-width="1.5"/>

  <g fill="#3a2818" fill-opacity="0.06" stroke="none">
    <rect x="80" y="50" width="30" height="40"/>
    <rect x="140" y="50" width="30" height="20"/>
    <rect x="200" y="50" width="30" height="35"/>
    <rect x="50" y="110" width="30" height="20"/>
    <rect x="110" y="100" width="30" height="55"/>
    <rect x="170" y="115" width="30" height="40"/>
    <rect x="80" y="140" width="30" height="35"/>
    <rect x="140" y="155" width="30" height="50"/>
    <rect x="200" y="135" width="30" height="50"/>
    <rect x="80" y="195" width="30" height="55"/>
    <rect x="170" y="210" width="30" height="40"/>
    <rect x="140" y="225" width="30" height="25"/>
  </g>

  <rect x="140" y="155" width="30" height="50" fill="#c1502e" fill-opacity="0.20" stroke="none"/>

  <g stroke="#3a2818" stroke-width="0.85" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 80 50 L 82 95 L 79 130 L 81 175 L 78 220 L 80 250"/>
    <path d="M 110 50 L 112 60 L 108 105 L 110 155 L 107 195 L 110 245 L 108 250"/>
    <path d="M 140 50 L 138 80 L 142 140 L 139 185 L 141 230 L 138 250"/>
    <path d="M 170 50 L 172 65 L 168 110 L 171 160 L 169 205 L 172 250"/>
    <path d="M 200 50 L 198 90 L 202 135 L 199 180 L 201 225 L 198 250"/>
    <path d="M 230 50 L 232 70 L 228 115 L 231 165 L 229 215 L 232 250"/>

    <path d="M 80 75 L 110 78"/>
    <path d="M 80 130 L 110 128"/>
    <path d="M 110 95 L 140 98"/>
    <path d="M 110 175 L 140 170"/>
    <path d="M 140 65 L 170 62"/>
    <path d="M 140 140 L 170 142"/>
    <path d="M 140 210 L 170 208"/>
    <path d="M 170 90 L 200 88"/>
    <path d="M 170 160 L 200 162"/>
    <path d="M 200 105 L 230 103"/>
    <path d="M 200 195 L 230 198"/>
    <path d="M 230 75 L 250 78"/>
    <path d="M 230 145 L 250 142"/>
    <path d="M 230 220 L 250 218"/>
    <path d="M 50 110 L 80 108"/>
    <path d="M 50 175 L 80 178"/>
    <path d="M 50 240 L 80 240"/>
  </g>

  <rect x="270" y="55" width="115" height="80" rx="4" ry="4" fill="#d8d4cf" stroke="#111" stroke-width="1.4"/>
  <ellipse cx="328" cy="95" rx="38" ry="12" fill="none" stroke="#aaa" stroke-width="0.7" stroke-dasharray="2 3"/>
  <ellipse cx="328" cy="95" rx="22" ry="6" fill="none" stroke="#bbb" stroke-width="0.6" stroke-dasharray="2 3"/>
  <text x="328" y="153" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">ailleurs : lisse</text>
  <text x="328" y="167" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">(hêtre, jeune orme)</text>

  <g fill="#c1502e" stroke="#c1502e">
    <line x1="290" y1="200" x2="172" y2="200" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="172,200 182,195 182,205"/>
  </g>
  <text x="295" y="194" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">petites plaques</text>
  <text x="295" y="210" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">rectangulaires</text>
  <text x="295" y="232" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">comme un fin</text>
  <text x="295" y="245" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">pavage vertical</text>

  <text x="150" y="278" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#888" font-style="italic">(seulement sur arbre adulte)</text>
</svg>
