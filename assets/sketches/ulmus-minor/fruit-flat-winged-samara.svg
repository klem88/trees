<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Samare en disque plat — Orme champêtre (Ulmus minor)</title>
  <desc id="desc">Schéma : la samare de l'orme est un disque plat arrondi à fine membrane translucide, avec la graine au centre. À droite, deux fruits ailés à comparer : la samare d'érable (en hélice) et la samare de frêne (allongée).</desc>

  <g transform="translate(120 150)">
    <path d="M 4 -64
             C 28 -64 56 -52 70 -32
             C 80 -10 80 10 70 32
             C 56 52 28 64 0 64
             C -28 64 -56 52 -70 32
             C -80 10 -80 -10 -70 -32
             C -56 -52 -28 -64 -4 -64
             L 0 -56
             L 4 -64 Z"
          fill="#fdfdfd" stroke="#111" stroke-width="1.6"/>

    <line x1="0" y1="-56" x2="0" y2="-78" stroke="#111" stroke-width="1.0"/>

    <g fill="none" stroke="#999" stroke-width="0.55">
      <path d="M 0 0 L 0 -42"/>
      <path d="M 0 0 L 28 -52"/>
      <path d="M 0 0 L -28 -52"/>
      <path d="M 0 0 L 60 -22"/>
      <path d="M 0 0 L -60 -22"/>
      <path d="M 0 0 L 70 8"/>
      <path d="M 0 0 L -70 8"/>
      <path d="M 0 0 L 56 36"/>
      <path d="M 0 0 L -56 36"/>
      <path d="M 0 0 L 0 56"/>
    </g>

    <ellipse cx="0" cy="0" rx="18" ry="13" fill="#c1502e" fill-opacity="0.22" stroke="none"/>
    <ellipse cx="0" cy="0" rx="14" ry="10" fill="white" stroke="#111" stroke-width="1.3"/>
  </g>

  <g fill="#c1502e" stroke="#c1502e">
    <line x1="225" y1="148" x2="142" y2="148" fill="none" stroke-width="1.4" stroke-linecap="round"/>
    <polygon points="142,148 152,143 152,153"/>
  </g>
  <text x="230" y="140" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">graine au centre</text>
  <text x="230" y="156" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">d'un disque plat</text>
  <text x="230" y="178" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">fine membrane</text>
  <text x="230" y="191" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">arrondie verdâtre</text>

  <g transform="translate(335 50)">
    <ellipse cx="0" cy="0" rx="5" ry="6" fill="white" stroke="#111" stroke-width="1.1"/>
    <path d="M 4 -3
             Q 24 -16 50 -20
             Q 56 -16 56 -8
             Q 48 8 24 14
             Q 12 12 4 4 Z"
          fill="#fdfdfd" stroke="#111" stroke-width="1.1"/>
  </g>
  <text x="340" y="92" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">érable :</text>
  <text x="340" y="106" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">aile en hélice</text>

  <g transform="translate(335 230)">
    <path d="M -25 0
             C -28 -3 -28 -8 -22 -10
             C 0 -12 22 -10 38 -8
             C 42 -6 42 0 38 4
             C 22 6 0 8 -22 6
             C -28 4 -28 0 -25 0 Z"
          fill="#fdfdfd" stroke="#111" stroke-width="1.1"/>
    <ellipse cx="-22" cy="-2" rx="4" ry="3.5" fill="white" stroke="#111" stroke-width="0.9"/>
  </g>
  <text x="340" y="258" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">frêne :</text>
  <text x="340" y="272" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">aile allongée</text>
</svg>
