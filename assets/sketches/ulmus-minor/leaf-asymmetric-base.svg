  <title id="title">Base asymétrique de la feuille — Orme champêtre (Ulmus minor)</title>
  <desc id="desc">Schéma au trait avec accent coloré : feuille d'orme vue de face, base nettement asymétrique mise en évidence. À droite, plus petite, une feuille à base symétrique pour comparaison.</desc>

