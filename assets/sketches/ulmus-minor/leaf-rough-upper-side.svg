  <text x="280" y="238" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="13" fill="#555" font-style="italic">lisse — ailleurs</text>
  <text x="280" y="256" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">type laurier, houx,</text>
