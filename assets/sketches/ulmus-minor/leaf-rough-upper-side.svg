<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Dessus de feuille rugueux — Orme champêtre (Ulmus minor)</title>
  <desc id="desc">Comparaison de deux surfaces : à gauche, une surface rugueuse couverte de petits points évoquant un grain ; à droite, une surface lisse. Sur l'orme champêtre, le dessus de la feuille présente ce léger grain quand on y passe le doigt.</desc>

  <text x="200" y="42" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="14" fill="#111" font-style="italic">Passe le doigt sur le dessus de la feuille...</text>

  <rect x="55" y="80" width="130" height="130" rx="6" ry="6" fill="#c1502e" fill-opacity="0.12" stroke="#111" stroke-width="1.4"/>

