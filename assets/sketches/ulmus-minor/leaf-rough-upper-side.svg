  <text x="120" y="238" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="13" fill="#c1502e" font-style="italic">rugueux — orme</text>
  <text x="120" y="256" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">comme du papier</text>
  <text x="120" y="270" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="11" fill="#555" font-style="italic">de verre très fin</text>

  <rect x="215" y="80" width="130" height="130" rx="6" ry="6" fill="white" stroke="#111" stroke-width="1.4"/>
